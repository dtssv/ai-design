server:
  port: 8081
  servlet:
    context-path: /api/admin/v1

spring:
  application:
    name: ai-copilot-admin
  datasource:
    url: jdbc:mysql://localhost:3306/ai_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.aicopilot.admin.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: aicopilot-admin-secret-key-change-in-production-2026-please-use-a-very-long-secret-key
  expiration: 86400000