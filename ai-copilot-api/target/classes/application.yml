server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ai-copilot-api
  datasource:
    url: jdbc:mysql://localhost:3306/ai_copilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
  # rabbitmq:
  #   host: localhost
  #   port: 5672
  #   username: guest
  #   password: guest
  mail:
    host: smtp.example.com
    port: 587
    username: noreply@example.com
    password: your-email-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  base-url: http://localhost:5173

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.aicopilot.api.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: aicopilot-secret-key-change-in-production-please-2026
  expiration: 86400000
  refresh-expiration: 604800000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: ai-copilot

ai:
  default-model: gpt-4
  api-key-pool:
    retry-count: 3
    timeout-seconds: 300

logging:
  level:
    com.aicopilot: DEBUG